# Grafana Dashboard Providers (auto-provisioned)

apiVersion: 1

providers:
  - name: 'Observability Stack'
    orgId: 1
    folder: 'Observability'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
