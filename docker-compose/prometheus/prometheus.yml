# Prometheus Configuration
# Scrape configs for all observability stack components

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# AlertManager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert and recording rules
rule_files:
  - "alert-rules.yml"
  - "recording-rules.yml"

# Scrape configurations
scrape_configs:
  # ─── Prometheus self-monitoring ──────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          environment: "demo"

  # ─── Node Exporter (host metrics) ───────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          environment: "demo"
          instance_type: "host"

  # ─── cAdvisor (container metrics) ───────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          environment: "demo"

  # ─── Demo Application Exporter ──────────
  - job_name: "demo-exporter"
    scrape_interval: 5s
    static_configs:
      - targets: ["demo-exporter:8000"]
        labels:
          environment: "demo"
          service: "demo-app"

  # ─── AlertManager ──────────────────────
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # ─── Loki ──────────────────────────────
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  # ─── Grafana ───────────────────────────
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
