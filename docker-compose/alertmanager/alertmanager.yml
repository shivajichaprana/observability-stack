# AlertManager Configuration
# Routes alerts to Slack and PagerDuty based on severity

global:
  resolve_timeout: 5m
  # Uncomment and set for Slack integration:
  # slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

# Alert templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree
route:
  # Default receiver
  receiver: 'slack-notifications'
  # Group alerts by these labels
  group_by: ['alertname', 'category', 'severity']
  # Wait before sending first notification for a group
  group_wait: 30s
  # Wait before sending updated notifications
  group_interval: 5m
  # Wait before resending same notification
  repeat_interval: 4h

  # Child routes for severity-based routing
  routes:
    # Critical alerts → PagerDuty (page on-call)
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Critical alerts also go to Slack
    - match:
        severity: critical
      receiver: 'slack-critical'
      group_wait: 10s

    # SLO burn-rate alerts → dedicated channel
    - match:
        category: slo
      receiver: 'slack-slo'
      group_by: ['alertname', 'slo']
      group_wait: 1m

    # Warning alerts → Slack
    - match:
        severity: warning
      receiver: 'slack-notifications'
      group_wait: 30s

# Inhibition rules (suppress lower-severity alerts when higher-severity fires)
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Receivers
receivers:
  - name: 'slack-notifications'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: '{{ .Status | toUpper }} | {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

  - name: 'slack-critical'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: '🚨 {{ .Status | toUpper }} | {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}

  - name: 'slack-slo'
    slack_configs:
      - channel: '#slo-alerts'
        send_resolved: true
        title: '📊 SLO Alert | {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *SLO:* {{ .Labels.slo }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: 'YOUR_PAGERDUTY_ROUTING_KEY'
        severity: critical
        description: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        details:
          severity: '{{ .CommonLabels.severity }}'
          category: '{{ .CommonLabels.category }}'
